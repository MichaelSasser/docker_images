---
name: Build ubuntu

on:
  schedule: [{ cron: '0 12 */7 * *' }]
  push:
    branches: [master]
    paths:
      - '.github/workflows/build.yml'
      - 'linux/ubuntu/ubuntu/**'
      - 'linux/ubuntu/scripts/**'
  pull_request:
    paths:
      - '.github/workflows/build.yml'
      - 'linux/ubuntu/ubuntu/**'
      - 'linux/ubuntu/scripts/**'
  workflow_dispatch:

env:
  SLUG: ${{ github.repository_owner }}/ubuntu
  SLUG_QUAY: ${{ vars.USERNAME_QUAY && format('{0}/ubuntu', vars.USERNAME_QUAY) || '' }}
  SLUG_DOCKER: ${{ vars.USERNAME_DOCKER && format('{0}/ubuntu', vars.USERNAME_DOCKER) || '' }}
  DISTRO: ubuntu
  NODE: '18 20 22'
  BUILD_REF: ${{ github.sha }}
  PUSH_GHCR: ${{ github.repository == (github.event.pull_request.head.repo.full_name || github.repository) && '1' || '' }}
  PUSH_QUAY: ${{ secrets.QUAY_USER && secrets.QUAY_TOKEN && '1' || '' }}
  PUSH_DOCKER_HUB: ${{ secrets.DOCKER_USER && secrets.DOCKER_TOKEN && '1' || '' }}
  LATEST_TAG: 24.04

jobs:
  ubuntu-amd64:
    name: Build ubuntu (amd64)
    runs-on: ubuntu-latest
    env:
      ARCH: amd64
      PLATFORM: linux/amd64
    outputs:
      tag: ${{ steps.stamp.outputs.tag }}
      part_tag: ${{ steps.stamp.outputs.part_tag }}
      is_release: ${{ steps.stamp.outputs.is_release }}
      tmp_ref: ${{ steps.promote.outputs.final_tag }}
      tmp_tag: ${{ steps.promote.outputs.final_tag }}
      digest: ${{ steps.promote.outputs.final_digest }}
    steps:
      - uses: actions/checkout@v5

      - uses: actions/github-script@v8
        with:
          github-token: n/a
          script: core.exportVariable('SLUG', process.env.SLUG.toLowerCase());

      - name: Stamp
        id: stamp
        run: |
          set -Eeuo pipefail

          TAG="${LATEST_TAG}"

          if [[ "${{ github.event_name }}" == "schedule" || "${{ github.event_name }}" == "workflow_dispatch" ]]; then
            PART_TAG=$(date +%Y%m%d)
            IS_RELEASE=1
          else
            PART_TAG=dev
            IS_RELEASE=0
          fi

          BUILD_DATE=$(date -u +%Y-%m-%dT%H:%M:%SZ)
          TMP_TAG="${TAG}-${PART_TAG}-tmp-${{ github.run_id }}-${ARCH}"
          TMP_REF="ghcr.io/${SLUG}:${TMP_TAG}"

          if [[ -n "${{ env.PUSH_GHCR }}" || -n "${{ env.PUSH_QUAY }}" || -n "${{ env.PUSH_DOCKER_HUB }}" ]]; then
            echo "SHOULD_PUSH=1" >> $GITHUB_ENV
          else
            echo "SHOULD_PUSH=0" >> $GITHUB_ENV
          fi

          echo "PART_TAG=${PART_TAG}" >> $GITHUB_ENV
          echo "IS_RELEASE=${IS_RELEASE}" >> $GITHUB_ENV
          echo "BUILD_DATE=${BUILD_DATE}" >> $GITHUB_ENV
          echo "BUILD_TAG=${TAG}" >> $GITHUB_ENV
          echo "TAG=${TAG}" >> $GITHUB_ENV
          echo "TMP_TAG=${TMP_TAG}" >> $GITHUB_ENV
          echo "TMP_REF=${TMP_REF}" >> $GITHUB_ENV

          echo "tag=${TAG}" >> $GITHUB_OUTPUT
          echo "part_tag=${PART_TAG}" >> $GITHUB_OUTPUT
          echo "is_release=${IS_RELEASE}" >> $GITHUB_OUTPUT

      - uses: docker/setup-buildx-action@v3

      - if: env.PUSH_GHCR && env.SHOULD_PUSH == '1'
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: '${{ github.actor }}'
          password: '${{ github.token }}'

      - if: env.PUSH_QUAY && env.SHOULD_PUSH == '1'
        uses: docker/login-action@v3
        with:
          registry: quay.io
          username: '${{ secrets.QUAY_USER }}'
          password: '${{ secrets.QUAY_TOKEN }}'

      - if: env.PUSH_DOCKER_HUB && env.SHOULD_PUSH == '1'
        uses: docker/login-action@v3
        with:
          username: '${{ secrets.DOCKER_USER }}'
          password: '${{ secrets.DOCKER_TOKEN }}'

      - name: Build ubuntu image
        if: env.SHOULD_PUSH == '1'
        id: build
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./linux/ubuntu/ubuntu/Dockerfile
          platforms: ${{ env.PLATFORM }}
          pull: true
          push: ${{ env.SHOULD_PUSH == '1' }}
          provenance: false
          sbom: false
          tags: ${{ env.TMP_REF }}
          build-args: |
            BUILD_DATE=${{ env.BUILD_DATE }}
            BUILD_REF=${{ env.BUILD_REF }}
            BUILD_TAG=${{ env.BUILD_TAG }}
            BUILD_TAG_VERSION=${{ env.PART_TAG }}
            BUILD_OWNER=${{ github.repository_owner }}
            BUILD_REPO=${{ github.repository }}
            DISTRO=${{ env.DISTRO }}
            FROM_IMAGE=buildpack-deps
            FROM_TAG=${{ env.TAG }}
            NODE_VERSION=${{ env.NODE }}
            RUNNER=root
          cache-from: type=registry,ref=ghcr.io/${{ env.SLUG }}:cache-ubuntu-${{ env.ARCH }}
          cache-to: type=registry,ref=ghcr.io/${{ env.SLUG }}:cache-ubuntu-${{ env.ARCH }},mode=max

      - name: Promote environment metadata
        if: env.SHOULD_PUSH == '1'
        id: promote
        env:
          TMP_REF: ${{ env.TMP_REF }}
          TMP_DIGEST: ${{ steps.build.outputs.digest }}
        run: |
          set -Eeuo pipefail
          TMP_IMAGE="${TMP_REF}@${TMP_DIGEST}"
          docker pull "${TMP_IMAGE}"
          cid=$(docker create "${TMP_IMAGE}")
          docker cp "${cid}:/etc/environment" env.list
          args=()
          while IFS= read -r line; do
            [[ -z "$line" || "$line" =~ ^# ]] && continue
            args+=( --change "ENV $line" )
          done < env.list
          docker commit "${args[@]}" "${cid}" "${TMP_REF}"
          docker rm "${cid}"
          rm env.list
          docker push "${TMP_REF}"
          FINAL_DIGEST=$(docker buildx imagetools inspect "${TMP_REF}" | awk '/Digest:/ {print $2; exit}')
          printf 'final_tag=%s\n' "${TMP_REF}" >> "$GITHUB_OUTPUT"
          printf 'final_digest=%s\n' "${FINAL_DIGEST}" >> "$GITHUB_OUTPUT"
          printf 'final_ref=%s@%s\n' "${TMP_REF}" "${FINAL_DIGEST}" >> "$GITHUB_OUTPUT"

  ubuntu-arm64:
    name: Build ubuntu (arm64)
    runs-on: ubuntu-24.04-arm
    env:
      ARCH: arm64
      PLATFORM: linux/arm64
    outputs:
      tag: ${{ steps.stamp.outputs.tag }}
      part_tag: ${{ steps.stamp.outputs.part_tag }}
      is_release: ${{ steps.stamp.outputs.is_release }}
      tmp_ref: ${{ steps.promote.outputs.final_tag }}
      tmp_tag: ${{ steps.promote.outputs.final_tag }}
      digest: ${{ steps.promote.outputs.final_digest }}
    steps:
      - uses: actions/checkout@v5

      - uses: actions/github-script@v8
        with:
          github-token: n/a
          script: core.exportVariable('SLUG', process.env.SLUG.toLowerCase());

      - name: Stamp
        id: stamp
        run: |
          set -Eeuo pipefail

          TAG="${LATEST_TAG}"

          if [[ "${{ github.event_name }}" == "schedule" || "${{ github.event_name }}" == "workflow_dispatch" ]]; then
            PART_TAG=$(date +%Y%m%d)
            IS_RELEASE=1
          else
            PART_TAG=dev
            IS_RELEASE=0
          fi

          BUILD_DATE=$(date -u +%Y-%m-%dT%H:%M:%SZ)
          TMP_TAG="${TAG}-${PART_TAG}-tmp-${{ github.run_id }}-${ARCH}"
          TMP_REF="ghcr.io/${SLUG}:${TMP_TAG}"

          if [[ -n "${{ env.PUSH_GHCR }}" || -n "${{ env.PUSH_QUAY }}" || -n "${{ env.PUSH_DOCKER_HUB }}" ]]; then
            echo "SHOULD_PUSH=1" >> $GITHUB_ENV
          else
            echo "SHOULD_PUSH=0" >> $GITHUB_ENV
          fi

          echo "PART_TAG=${PART_TAG}" >> $GITHUB_ENV
          echo "IS_RELEASE=${IS_RELEASE}" >> $GITHUB_ENV
          echo "BUILD_DATE=${BUILD_DATE}" >> $GITHUB_ENV
          echo "BUILD_TAG=${TAG}" >> $GITHUB_ENV
          echo "TAG=${TAG}" >> $GITHUB_ENV
          echo "TMP_TAG=${TMP_TAG}" >> $GITHUB_ENV
          echo "TMP_REF=${TMP_REF}" >> $GITHUB_ENV

          echo "tag=${TAG}" >> $GITHUB_OUTPUT
          echo "part_tag=${PART_TAG}" >> $GITHUB_OUTPUT
          echo "is_release=${IS_RELEASE}" >> $GITHUB_OUTPUT

      - uses: docker/setup-buildx-action@v3

      - if: env.PUSH_GHCR && env.SHOULD_PUSH == '1'
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: '${{ github.actor }}'
          password: '${{ github.token }}'

      - if: env.PUSH_QUAY && env.SHOULD_PUSH == '1'
        uses: docker/login-action@v3
        with:
          registry: quay.io
          username: '${{ secrets.QUAY_USER }}'
          password: '${{ secrets.QUAY_TOKEN }}'

      - if: env.PUSH_DOCKER_HUB && env.SHOULD_PUSH == '1'
        uses: docker/login-action@v3
        with:
          username: '${{ secrets.DOCKER_USER }}'
          password: '${{ secrets.DOCKER_TOKEN }}'

      - name: Build ubuntu image
        if: env.SHOULD_PUSH == '1'
        id: build
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./linux/ubuntu/ubuntu/Dockerfile
          platforms: ${{ env.PLATFORM }}
          pull: true
          push: ${{ env.SHOULD_PUSH == '1' }}
          provenance: false
          sbom: false
          tags: ${{ env.TMP_REF }}
          build-args: |
            BUILD_DATE=${{ env.BUILD_DATE }}
            BUILD_REF=${{ env.BUILD_REF }}
            BUILD_TAG=${{ env.BUILD_TAG }}
            BUILD_TAG_VERSION=${{ env.PART_TAG }}
            BUILD_OWNER=${{ github.repository_owner }}
            BUILD_REPO=${{ github.repository }}
            DISTRO=${{ env.DISTRO }}
            FROM_IMAGE=buildpack-deps
            FROM_TAG=${{ env.TAG }}
            NODE_VERSION=${{ env.NODE }}
            RUNNER=root
          cache-from: type=registry,ref=ghcr.io/${{ env.SLUG }}:cache-ubuntu-${{ env.ARCH }}
          cache-to: type=registry,ref=ghcr.io/${{ env.SLUG }}:cache-ubuntu-${{ env.ARCH }},mode=max

      - name: Promote environment metadata
        if: env.SHOULD_PUSH == '1'
        id: promote
        env:
          TMP_REF: ${{ env.TMP_REF }}
          TMP_DIGEST: ${{ steps.build.outputs.digest }}
        run: |
          set -Eeuo pipefail
          TMP_IMAGE="${TMP_REF}@${TMP_DIGEST}"
          docker pull "${TMP_IMAGE}"
          cid=$(docker create "${TMP_IMAGE}")
          docker cp "${cid}:/etc/environment" env.list
          args=()
          while IFS= read -r line; do
            [[ -z "$line" || "$line" =~ ^# ]] && continue
            args+=( --change "ENV $line" )
          done < env.list
          docker commit "${args[@]}" "${cid}" "${TMP_REF}"
          docker rm "${cid}"
          rm env.list
          docker push "${TMP_REF}"
          FINAL_DIGEST=$(docker buildx imagetools inspect "${TMP_REF}" | awk '/Digest:/ {print $2; exit}')
          printf 'final_tag=%s\n' "${TMP_REF}" >> "$GITHUB_OUTPUT"
          printf 'final_digest=%s\n' "${FINAL_DIGEST}" >> "$GITHUB_OUTPUT"
          printf 'final_ref=%s@%s\n' "${TMP_REF}" "${FINAL_DIGEST}" >> "$GITHUB_OUTPUT"

  ubuntu-merge:
    name: Publish ubuntu manifests ${{ needs.ubuntu-amd64.outputs.tag }}
    needs:
      - ubuntu-amd64
      - ubuntu-arm64
    runs-on: ubuntu-latest
    if: ${{ needs.ubuntu-amd64.outputs.tmp_ref && needs.ubuntu-arm64.outputs.tmp_ref }}
    env:
      TAG: ${{ needs.ubuntu-amd64.outputs.tag }}
      PART_TAG: ${{ needs.ubuntu-amd64.outputs.part_tag }}
      IS_RELEASE: ${{ needs.ubuntu-amd64.outputs.is_release }}
      TMP_REF_AMD64: ${{ needs.ubuntu-amd64.outputs.tmp_ref }}
      TMP_TAG_AMD64: ${{ needs.ubuntu-amd64.outputs.tmp_tag }}
      TMP_REF_ARM64: ${{ needs.ubuntu-arm64.outputs.tmp_ref }}
      TMP_TAG_ARM64: ${{ needs.ubuntu-arm64.outputs.tmp_tag }}
      PRIMARY_TAG: ${{ needs.ubuntu-amd64.outputs.tag }}-${{ needs.ubuntu-amd64.outputs.part_tag }}
    steps:
      - uses: actions/checkout@v5

      - uses: actions/github-script@v8
        with:
          github-token: n/a
          script: core.exportVariable('SLUG', process.env.SLUG.toLowerCase());

      - uses: docker/setup-buildx-action@v3

      - if: env.PUSH_GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: '${{ github.actor }}'
          password: '${{ github.token }}'

      - if: env.PUSH_QUAY
        uses: docker/login-action@v3
        with:
          registry: quay.io
          username: '${{ secrets.QUAY_USER }}'
          password: '${{ secrets.QUAY_TOKEN }}'

      - if: env.PUSH_DOCKER_HUB
        uses: docker/login-action@v3
        with:
          username: '${{ secrets.DOCKER_USER }}'
          password: '${{ secrets.DOCKER_TOKEN }}'

      - name: Create multi-arch manifest
        run: |
          set -Eeuo pipefail
          PRIMARY_REF="ghcr.io/${SLUG}:${PRIMARY_TAG}"
          docker buildx imagetools create --tag "${PRIMARY_REF}" "${TMP_REF_AMD64}" "${TMP_REF_ARM64}"
          echo "PRIMARY_REF=${PRIMARY_REF}" >> $GITHUB_ENV

      - name: Inspect manifest digest
        run: |
          set -Eeuo pipefail
          DIGEST=$(docker buildx imagetools inspect "${PRIMARY_REF}" | awk '/Digest:/ {print $2; exit}')
          echo "PRIMARY_DIGEST=${DIGEST}" >> $GITHUB_ENV
          echo "PRIMARY_REF_DIGEST=${PRIMARY_REF}@${DIGEST}" >> $GITHUB_ENV

      - name: Tag and push manifests
        env:
          TAG: ${{ env.TAG }}
          PART_TAG: ${{ env.PART_TAG }}
          IS_RELEASE: ${{ env.IS_RELEASE }}
          PRIMARY_TAG: ${{ env.PRIMARY_TAG }}
          PRIMARY_REF_DIGEST: ${{ env.PRIMARY_REF_DIGEST }}
          SLUG: ${{ env.SLUG }}
          SLUG_QUAY: ${{ env.SLUG_QUAY }}
          SLUG_DOCKER: ${{ env.SLUG_DOCKER }}
          PUSH_GHCR: ${{ env.PUSH_GHCR }}
          PUSH_QUAY: ${{ env.PUSH_QUAY }}
          PUSH_DOCKER_HUB: ${{ env.PUSH_DOCKER_HUB }}
        run: |
          set -Eeuo pipefail

          declare -a TAG_SUFFIXES=(
            "${PRIMARY_TAG}"
            "latest-${PART_TAG}"
          )

          if [[ "${IS_RELEASE}" == "1" ]]; then
            TAG_SUFFIXES+=("${TAG}" "latest" "${TAG}-dev")
          else
            TAG_SUFFIXES+=("${TAG}-dev")
          fi

          TAG_SUFFIXES+=("latest-dev")

          mapfile -t UNIQUE_TAGS < <(printf '%s\n' "${TAG_SUFFIXES[@]}" | awk '!seen[$0]++')

          declare -a GHCR_TAGS=()
          for tag in "${UNIQUE_TAGS[@]}"; do
            if [[ "${tag}" != "${PRIMARY_TAG}" ]]; then
              GHCR_TAGS+=("${tag}")
            fi
          done

          push_tags() {
            local prefix="$1"
            local enabled="$2"
            shift 2

            if [[ -z "${enabled}" ]]; then
              return 0
            fi

            if [[ $# -eq 0 ]]; then
              return 0
            fi

            local args=()
            for tag in "$@"; do
              args+=("--tag" "${prefix}:${tag}")
            done
            args+=("${PRIMARY_REF_DIGEST}")

            local attempt=1
            local max_attempts=3
            while [[ ${attempt} -le ${max_attempts} ]]; do
              if docker buildx imagetools create "${args[@]}"; then
                return 0
              fi
              if [[ ${attempt} -eq ${max_attempts} ]]; then
                echo "Warning: failed to push tags for ${prefix} after ${max_attempts} attempts" >&2
                return 0
              fi
              echo "Retrying push for ${prefix} (attempt ${attempt})" >&2
              sleep $((attempt * 10))
              attempt=$((attempt + 1))
            done
          }

          push_tags "ghcr.io/${SLUG}" "${PUSH_GHCR}" "${GHCR_TAGS[@]}"

          if [[ -n "${SLUG_QUAY}" ]]; then
            push_tags "quay.io/${SLUG_QUAY}" "${PUSH_QUAY}" "${UNIQUE_TAGS[@]}"
          fi

          if [[ -n "${SLUG_DOCKER}" ]]; then
            push_tags "docker.io/${SLUG_DOCKER}" "${PUSH_DOCKER_HUB}" "${UNIQUE_TAGS[@]}"
          fi

      - name: Cleanup temporary tags
        run: |
          docker buildx imagetools rm "${TMP_REF_AMD64}" || true
          docker buildx imagetools rm "${TMP_REF_ARM64}" || true
